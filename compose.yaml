services:
  postgres:
    image: postgres:16-alpine
    container_name: reghinna-postgres-local

    environment:
      POSTGRES_USER: reghinna
      POSTGRES_PASSWORD: reghinna_local_password
      POSTGRES_DB: reghinna_local

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - reghinna_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U reghinna -d reghinna_local
      interval: 5s
      timeout: 5s
      retries: 10

    restart: unless-stopped

volumes:
  reghinna_postgres_data: